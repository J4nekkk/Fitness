// ─── UTILS ───
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayKey(){return dateKey(new Date())}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function getCalDays(y,m){const f=new Date(y,m,1),l=new Date(y,m+1,0);let s=f.getDay()-1;if(s<0)s=6;const d=[];for(let i=0;i<s;i++)d.push(null);for(let i=1;i<=l.getDate();i++)d.push(i);return d}

// ─── RING ───
function Ring({pct,size=120,stroke=6,color='#a3e635',children}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(Math.min(pct,1)*circ);
  return e('div',{style:{position:'relative',width:size,height:size}},
    e('svg',{width:size,height:size,style:{transform:'rotate(-90deg)'}},
      e('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'rgba(255,255,255,0.06)',strokeWidth:stroke}),
      e('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:stroke,strokeDasharray:circ,strokeDashoffset:off,strokeLinecap:'round',style:{transition:'stroke-dashoffset 0.6s ease'}})
    ),
    e('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},children)
  );
}

// ─── MINI CALENDAR ───
function MiniCal({year,month,onMC,sel,onSel,dot}){
  const days=getCalDays(year,month),tk=todayKey();
  return e('div',{style:{marginBottom:16}},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      e('button',{onClick:()=>onMC(-1),style:S.calArr},'‹'),
      e('span',{style:{fontSize:15,fontWeight:700}},MONTHS[month]+' '+year),
      e('button',{onClick:()=>onMC(1),style:S.calArr},'›')
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,textAlign:'center'}},
      WEEKDAYS.map(w=>e('div',{key:w,style:{fontSize:10,color:'rgba(255,255,255,0.3)',padding:'4px 0',fontWeight:600}},w)),
      days.map((d,i)=>{
        if(!d)return e('div',{key:'e'+i});
        const dk=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const isT=dk===tk,isS=dk===sel;
        return e('button',{key:i,onClick:()=>onSel(dk),style:{background:isS?'#a3e635':isT?'rgba(163,230,53,0.15)':'transparent',
          color:isS?'#0a0a0a':isT?'#a3e635':'#ccc',border:'none',borderRadius:10,padding:'6px 0',fontSize:13,
          fontWeight:isS||isT?700:400,cursor:'pointer',position:'relative',minHeight:36,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
          d,dot&&dot(dk)
        );
      })
    )
  );
}

function Profile({profile:p,setProfile:setP,onClose}){
  const[ef,setEf]=useState(null),[tmp,setTmp]=useState(''),[showAv,setShowAv]=useState(false),[nw,setNw]=useState('');
  const startE=f=>{setEf(f);setTmp(String(p[f]||''))};
  const saveE=()=>{if(ef){setP(x=>({...x,[ef]:tmp}));setEf(null)}};
  const addW=()=>{const w=parseFloat(nw);if(!w)return;setP(x=>({...x,weight:w,weightHistory:[...(x.weightHistory||[]),{date:todayKey(),value:w}]}));setNw('')};
  const wh=p.weightHistory||[],minW=wh.length?Math.min(...wh.map(x=>x.value)):0,maxW=wh.length?Math.max(...wh.map(x=>x.value)):100,range=maxW-minW||1;

  const field=(label,key,unit)=>e('div',{style:S.pField},
    e('span',{style:{fontSize:13,color:'rgba(255,255,255,0.5)'}},label),
    ef===key?e('div',{style:{display:'flex',gap:6,alignItems:'center'}},
      e('input',{value:tmp,onChange:v=>setTmp(v.target.value),style:{...S.numIn,width:80},autoFocus:true,onKeyDown:v=>v.key==='Enter'&&saveE()}),

        e('div',{style:{fontSize:28,marginBottom:8}},h.icon),
